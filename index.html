<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Performers</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1e1e1e;
      --text: #ffffff;
      --accent: #ff4d4d;
    }

    body.light {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #111111;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    header {
      padding: 1rem;
      text-align: center;
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    input {
      padding: 0.6rem;
      width: 70%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-top: 0.5rem;
    }

    .toggle {
      margin-top: 0.5rem;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      padding: 1rem;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .content {
      padding: 0.8rem;
    }

    .username {
      font-weight: bold;
    }

    .viewers {
      color: var(--accent);
      font-size: 0.9rem;
    }

    .badge {
      display: inline-block;
      background: red;
      padding: 2px 6px;
      font-size: 0.7rem;
      border-radius: 6px;
      margin-left: 5px;
    }

    .btn {
      display: block;
      margin-top: 0.6rem;
      text-align: center;
      background: var(--accent);
      padding: 0.5rem;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 16px;
      height: 220px;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body>

<header>
  <h2>🔥 Live Now</h2>
  <input type="text" id="search" placeholder="Search performers...">
  <div class="toggle" id="themeToggle">Toggle Light/Dark</div>
</header>

<div class="grid" id="grid"></div>

<script>
  const API_URL = "https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=request_ip";
  let performers = [];

  function showSkeleton() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < 10; i++) {
      const skel = document.createElement('div');
      skel.className = 'skeleton';
      grid.appendChild(skel);
    }
  }

  async function fetchData() {
    showSkeleton();
    try {
      const res = await fetch(API_URL);
      const data = await res.json();

      performers = data.results
        .sort((a, b) => b.num_users - a.num_users)
        .slice(0, 10);

      render(performers);
    } catch (err) {
      document.getElementById('grid').innerHTML = "<p style='padding:1rem'>Failed to load data.</p>";
    }
  }

  function render(list) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    list.forEach((p, index) => {
      const card = document.createElement('div');
      card.className = 'card';

      const trending = index < 3 ? "<span class='badge'>🔥 Trending</span>" : "";

      card.innerHTML = `
        <img loading="lazy" src="${p.image_url}" alt="${p.username}">
        <div class="content">
          <div class="username">${p.username} ${trending}</div>
          <div class="viewers">👁 ${p.num_users} watching <span class="badge">LIVE</span></div>
          <a class="btn" href="https://chaturbate.com/${p.username}/?wm=T2CSW" target="_blank">Watch Now</a>
        </div>
      `;

      grid.appendChild(card);
    });
  }

  document.getElementById('search').addEventListener('input', (e) => {
    const value = e.target.value.toLowerCase();
    const filtered = performers.filter(p =>
      p.username.toLowerCase().includes(value) ||
      (p.tags && p.tags.join(' ').toLowerCase().includes(value))
    );
    render(filtered);
  });

  // Auto-refresh every 45 seconds
  setInterval(fetchData, 45000);

  // Theme toggle
  document.getElementById('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('light');
  });

  fetchData();
</script>

</body>
</html>
